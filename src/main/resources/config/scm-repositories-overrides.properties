# SCM override mappings (packaged inside the jar)
#
# On first run, the application copies this template to:
#   <app-base-dir>/config/scm-repositories-overrides.properties
#
# You can override the target file path with:
#   -Ddependency.analyzer.scm.overrides.file=/absolute/path/to/file.properties

# Artifact mappings: artifact.<artifactId>=<repoUrl>
artifact.commons-collections=https://github.com/apache/commons-collections
artifact.commons-text=https://github.com/apache/commons-text
artifact.commons-io=https://github.com/apache/commons-io
artifact.hibernate-validator-cdi=http://github.com/hibernate/hibernate-validator/
artifact.rest-assured=http://github.com/rest-assured/rest-assured/
artifact.microprofile-openapi-api=https://github.com/eclipse/microprofile-open-api/
artifact.jersey-media-json-binding=https://github.com/eclipse-ee4j/jersey/
artifact.microprofile-metrics-api=https://github.com/eclipse/microprofile-metrics
artifact.helidon=https://github.com/helidon-io/helidon
artifact.opencsv=https://git.code.sf.net/p/opencsv/source


# Group mappings: group.<groupId>=<repoUrl>
group.org.yaml=https://bitbucket.org/snakeyaml/snakeyaml
